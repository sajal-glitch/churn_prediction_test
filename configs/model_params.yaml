logistic_regression:
  classifier__C: [0.01, 0.1, 1.0, 10.0, 100.0]
  classifier__penalty: [l1, l2]
  classifier__solver: [saga]
  classifier__max_iter: [500, 1000]
  classifier__class_weight: [balanced]

random_forest:
  classifier__n_estimators: [100, 200, 300]
  classifier__max_depth: [null, 10, 20, 30]
  classifier__min_samples_split: [2, 5, 10]
  classifier__min_samples_leaf: [1, 2, 4]
  classifier__max_features: [sqrt, log2]
  classifier__class_weight: [balanced, balanced_subsample]

xgboost:
  classifier__n_estimators: [100, 200, 500]
  classifier__max_depth: [3, 5, 7, 9]
  classifier__learning_rate: [0.01, 0.05, 0.1, 0.2]
  classifier__subsample: [0.6, 0.8, 1.0]
  classifier__colsample_bytree: [0.6, 0.8, 1.0]
  classifier__reg_alpha: [0, 0.1, 1.0]
  classifier__reg_lambda: [1.0, 5.0, 10.0]
  classifier__scale_pos_weight: [0.763, 1.0]
  classifier__tree_method: [hist]

# xgboost_optuna — documents the Optuna TPE search space used by tune_model_optuna().
# These are continuous/integer ranges, not discrete lists.
# The actual sampling is performed in src/models/train.py::tune_model_optuna.
# Fixed kwargs passed on every trial: tree_method=hist, eval_metric=auc,
#   random_state=42, verbosity=0.
xgboost_optuna:
  n_estimators:
    type: int
    low: 100
    high: 800
  max_depth:
    type: int
    low: 3
    high: 10
  learning_rate:
    type: float
    low: 0.005
    high: 0.3
    log: true
  subsample:
    type: float
    low: 0.5
    high: 1.0
  colsample_bytree:
    type: float
    low: 0.5
    high: 1.0
  reg_alpha:
    type: float
    low: 1.0e-8
    high: 10.0
    log: true
  reg_lambda:
    type: float
    low: 1.0e-8
    high: 10.0
    log: true
  min_child_weight:
    type: int
    low: 1
    high: 10
  scale_pos_weight:
    type: float
    low: 0.5
    high: 2.0
